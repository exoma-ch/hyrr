name: Deploy GitHub Pages redirect → hyrr.ethz.ch

# HYRR's app + license-restricted nuclear data now live ONLY on the gated ETH
# instances (https://hyrr.ethz.ch, SWITCH AAI). GitHub Pages no longer serves
# the app — it publishes a tiny redirect so there is ONE site to maintain and
# no licensed data is exposed publicly.
#
# The previous app-build pipeline is preserved in .github/workflows-archive/
# (deploy-frontend.yml.orig, promote-to-prod.yml, deploy-staging-smoke.yml).
#
# Manual trigger only: run this AFTER prod is live (just elevate) so the
# redirect doesn't point at the placeholder. First run purges the old public
# app/data from gh-pages (clean: true).
on:
  workflow_dispatch:

permissions:
  contents: write # push to gh-pages branch

concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      # Required: the Pages deploy action initializes git from the workspace.
      - uses: actions/checkout@v7
        with:
          submodules: false

      - name: Build redirect site
        run: |
          mkdir -p site/tst
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>HYRR has moved to hyrr.ethz.ch</title>
            <link rel="canonical" href="https://hyrr.ethz.ch/" />
            <meta http-equiv="refresh" content="0; url=https://hyrr.ethz.ch/" />
            <!-- Carry any #config=… share hash across to the new domain. -->
            <script>location.replace("https://hyrr.ethz.ch/" + location.hash);</script>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 34rem; margin: 14vh auto; padding: 0 1.2rem; line-height: 1.55; color: #0f1117; }
              a { color: #2563eb; }
            </style>
          </head>
          <body>
            <h1>HYRR has moved</h1>
            <p>HYRR now lives at <a href="https://hyrr.ethz.ch/">hyrr.ethz.ch</a>
               (ETH&nbsp;/ SWITCH&nbsp;AAI login required). Redirecting…</p>
          </body>
          </html>
          EOF
          # Same redirect for deep links, old /tst/ staging links, and 404s.
          cp site/index.html site/404.html
          cp site/index.html site/tst/index.html

      - name: Deploy redirect to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          target-folder: .
          # Purge the previously-published app + nuclear data from the public
          # site (license). Keep PR preview slots if any exist.
          clean: true
          clean-exclude: |
            preview/**
          commit-message: "deploy(gh-pages): redirect → hyrr.ethz.ch (single maintained site)"
