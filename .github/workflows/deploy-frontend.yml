name: Deploy frontend (staging slot)

# Every push to main lands in /hyrr/tst/ — never directly to /hyrr/.
# Promotion to prod is gated behind the staging smoke (deploy-staging-smoke.yml)
# and explicit dispatch of promote-to-prod.yml. This means broken main pushes
# can't land on the user-facing URL anymore — they fail the smoke and the
# previous prod stays live.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: write # needed to push to gh-pages branch
  pages: read

# Serialize against the prod promotion workflow — they both write the same branch.
concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set data/meta data/stopping data/tendl-2025/xs data/hi-xs-prod/xs data/endfb-8.1/xs

      - name: Copy nuclear data for frontend
        run: |
          mkdir -p frontend/public/data/parquet/{meta,stopping,xs,hi-xs-prod,neutron-xs}
          cp nucl-parquet/data/meta/abundances.parquet nucl-parquet/data/meta/decay.parquet nucl-parquet/data/meta/elements.parquet frontend/public/data/parquet/meta/
          cp -f nucl-parquet/data/meta/dose_constants.parquet frontend/public/data/parquet/meta/ 2>/dev/null || true
          cp -f nucl-parquet/data/meta/spectrum_xs.parquet frontend/public/data/parquet/meta/ 2>/dev/null || true
          # He3STAR removed in nucl-parquet data-2026.5.0 — ³He routes through ASTAR with velocity-scaling at lookup time (see packages/compute/src/_energy-loss.ts and core/src/stopping.rs).
          cp nucl-parquet/data/stopping/PSTAR.parquet nucl-parquet/data/stopping/ASTAR.parquet nucl-parquet/data/stopping/dSTAR.parquet nucl-parquet/data/stopping/tSTAR.parquet frontend/public/data/parquet/stopping/
          cp nucl-parquet/data/stopping/catima_C12.parquet nucl-parquet/data/stopping/catima_O16.parquet nucl-parquet/data/stopping/catima_Ne20.parquet nucl-parquet/data/stopping/catima_Si28.parquet nucl-parquet/data/stopping/catima_Ar40.parquet nucl-parquet/data/stopping/catima_Fe56.parquet frontend/public/data/parquet/stopping/
          cp nucl-parquet/data/tendl-2025/xs/*.parquet frontend/public/data/parquet/xs/
          cp nucl-parquet/data/hi-xs-prod/xs/*.parquet frontend/public/data/parquet/hi-xs-prod/
          cp nucl-parquet/data/endfb-8.1/xs/n_*.parquet frontend/public/data/parquet/neutron-xs/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Build WASM compute engine
        run: wasm-pack build wasm/ --target web --no-opt --out-dir ../frontend/src/lib/compute/hyrr-wasm-pkg

      - name: Install dependencies
        run: npm install

      - name: Fix rollup native bindings
        working-directory: frontend
        run: npm install @rollup/rollup-linux-x64-gnu --no-save 2>/dev/null || true

      - name: Build frontend (base=/hyrr/tst/)
        working-directory: frontend
        env:
          VITE_BASE_PATH: /hyrr/tst/
        run: npm run build

      - name: Deploy to gh-pages /tst/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/dist
          target-folder: tst
          # `clean` removes files inside `tst/` that aren't in `frontend/dist`.
          # It doesn't touch sibling folders like `/` (prod) or `/preview/*/`.
          clean: true
          # Record the source SHA so promote-to-prod can reproduce this build.
          commit-message: "deploy(staging): tst/ from ${{ github.sha }}"
