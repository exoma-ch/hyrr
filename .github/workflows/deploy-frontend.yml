name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Checkout nucl-parquet submodule (sparse)
        uses: actions/checkout@v4
        with:
          repository: exoma-ch/nucl-parquet
          ref: py_0.3.1
          path: nucl-parquet
          sparse-checkout: |
            meta
            stopping
            tendl-2024

      - name: Copy nuclear data for frontend
        run: |
          mkdir -p frontend/public/data/parquet/{meta,stopping,xs}
          cp nucl-parquet/meta/abundances.parquet nucl-parquet/meta/decay.parquet nucl-parquet/meta/elements.parquet frontend/public/data/parquet/meta/
          cp -f nucl-parquet/meta/dose_constants.parquet frontend/public/data/parquet/meta/ 2>/dev/null || true
          cp nucl-parquet/stopping/stopping.parquet frontend/public/data/parquet/stopping/
          cp nucl-parquet/tendl-2024/xs/*.parquet frontend/public/data/parquet/xs/

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
