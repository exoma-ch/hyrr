name: Deploy GitHub Pages landing → hyrr

# HYRR's app + license-restricted nuclear data live ONLY on the gated ETH
# instances (https://hyrrprd.ethz.ch, SWITCH AAI). GitHub Pages serves a
# PUBLIC landing page (landing/) that describes HYRR and routes people to the
# gated app or to a "request access" form — so there is one public face and no
# licensed data is exposed publicly.
#
# The previous app-build pipeline is preserved in .github/workflows-archive/
# (deploy-frontend.yml.orig, promote-to-prod.yml, deploy-staging-smoke.yml).
#
# Manual trigger. First run purges the old public app/data from gh-pages
# (clean: true).
on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: write # push to gh-pages branch

concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

jobs:
  landing:
    runs-on: ubuntu-latest
    steps:
      # Required: the Pages deploy action initializes git from the workspace.
      - uses: actions/checkout@v7
        with:
          submodules: false

      - name: Assemble landing site
        run: |
          mkdir -p site
          cp landing/index.html site/index.html
          # Unknown paths (incl. old deep links) land on the landing page.
          cp landing/index.html site/404.html
          # Favicon / wordmark icon (best-effort; landing degrades if absent).
          cp frontend/public/hyrr-icon-192.png site/ 2>/dev/null || true
          cp frontend/public/favicon.svg site/ 2>/dev/null || true

      - name: Deploy landing to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          target-folder: .
          # Purge the previously-published app + nuclear data from the public
          # site (license). Keep PR preview slots if any exist.
          clean: true
          clean-exclude: |
            preview/**
          commit-message: "deploy(gh-pages): public landing page for HYRR"
