name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set meta stopping tendl-2024/xs

      - name: Copy nuclear data for frontend
        run: |
          mkdir -p frontend/public/data/parquet/{meta,stopping,xs}
          cp nucl-parquet/meta/abundances.parquet nucl-parquet/meta/decay.parquet nucl-parquet/meta/elements.parquet frontend/public/data/parquet/meta/
          cp -f nucl-parquet/meta/dose_constants.parquet frontend/public/data/parquet/meta/ 2>/dev/null || true
          cp nucl-parquet/stopping/stopping.parquet frontend/public/data/parquet/stopping/
          cp nucl-parquet/tendl-2024/xs/*.parquet frontend/public/data/parquet/xs/

      - name: Install dependencies
        run: npm install

      - name: Fix rollup native bindings
        working-directory: frontend
        run: npm install @rollup/rollup-linux-x64-gnu --no-save 2>/dev/null || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build docs into frontend/dist/docs/
        run: |
          pip install -e ".[docs]"
          mkdocs build -d frontend/dist/docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
