name: Tauri Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  # `id-token` + `attestations` are required for the build-provenance
  # attestation step (#116). Treats the supply-chain provenance and the
  # updater minisign signature as separate concerns — see the spike
  # resolution in #116. Both are baseline; either one alone is insufficient.
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-target: x86_64-pc-windows-msvc
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Init nucl-parquet submodule (sparse)
        shell: bash
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set --no-cone \
            'clients/rs/nucl-parquet/' \
            'data/catalog.json' \
            'data/meta/' \
            'data/stopping/' \
            'data/tendl-2023-iso/xs/'

      - name: Copy parquet data to frontend public dir
        shell: bash
        run: scripts/copy-frontend-data.sh nucl-parquet/data frontend/public/data/parquet tendl-2023-iso

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          cache-on-failure: false
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        shell: bash
        run: |
          npm install
          cd frontend
          npm install
          # npm optional dep bug: platform-specific rollup bindings may be missing
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save 2>/dev/null || true
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            npm install @rollup/rollup-win32-x64-msvc --no-save 2>/dev/null || true
          fi

      - name: Build and release desktop app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ENV_PLATFORM: ${{ matrix.platform }}
          # Updater signing — the private key is generated offline on a
          # trusted machine, NOT in CI. Both env vars must be set in repo
          # secrets before the first signed release. If they're empty,
          # tauri-action skips signature generation and the resulting
          # build won't be acceptable to the deployed updater (which
          # verifies against the pubkey baked into tauri.conf.json).
          # Rotation runbook: docs/KEY_ROTATION.md.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "HYRR ${{ github.ref_name }}"
          releaseBody: "Desktop app for offline use. See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)."
          releaseDraft: false
          prerelease: false
          # `latest.json` (the updater manifest tauri-action uploads to
          # the Release) is what `tauri-plugin-updater` polls — the
          # endpoint in tauri.conf.json points to the GH-Releases-latest
          # download URL. The release is created by release-please; this
          # workflow uploads artifacts to it.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # Drop macOS .app bundle paths from the attest subject list. .app is a
      # *directory* — actions/attest-build-provenance recurses into it and
      # registers every contained file (Frameworks/, Resources/, _CodeSignature/,
      # MainBin), easily blowing past the action's 1024-subject cap. The
      # accompanying .dmg + .tar.gz + .sig already cover the .app contents
      # transitively, so we lose nothing by dropping it.
      - name: Filter artifact paths for attestation
        id: filter_artifacts
        if: ${{ steps.tauri_build.outputs.artifactPaths != '' }}
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          filtered=$(printf '%s' "$ARTIFACT_PATHS" | jq -c 'map(select(endswith(".app") | not))')
          {
            echo "paths<<EOF"
            echo "$filtered"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build provenance attestation (Sigstore-keyless via GitHub OIDC).
      # Separate trust layer from the minisign updater signature: the
      # attestation proves "this binary came from this exact workflow run
      # on this exact commit", verifiable later via `gh attestation
      # verify`. Same model cargo-dist / uv ship. The minisign signature
      # remains the runtime trust check.
      - name: Attest build provenance
        if: ${{ steps.tauri_build.outputs.artifactPaths != '' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.filter_artifacts.outputs.paths }}
