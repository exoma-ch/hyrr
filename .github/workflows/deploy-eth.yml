name: Deploy to ETH webhosting

# Promotion ladder for the ETH Zürich web instances:
#   ent (hyrrent.ethz.ch) ─▶ tst (hyrrtst.ethz.ch) ─▶ prd (hyrr.ethz.ch)
#
# How CI reaches ETH:
# The webhosting instances (hyrr{ent,tst,prd}.ethz.ch:22) are ETH-network-only,
# but the heimdall bastion (pcposeth5.ethz.ch:22) is publicly reachable — so a
# GitHub-hosted runner deploys by ProxyJump-ing the bastion (the SSH-config
# aliases written below, HYRR_ETH_SSH_PREFIX=ethz-hyrr).
#
# Secrets: everything (both SSH keys, known_hosts, the Shibboleth whitelist) is
# age-encrypted in secrets/eth-deploy.sops.env — versioned + rotatable via git.
# The ONLY GitHub secret is SOPS_AGE_KEY (the age private key). Bootstrap/rotate:
#   scripts/bootstrap-eth-secrets.sh --whitelist FILE --set-age-secret
# Then flip repo variable CI_DEPLOY_ENABLED=true. Local deploys from a Mac on the
# ETH VPN still work:  just deploy-eth-ladder  /  just elevate
#
# This mirrors gerchowl/duplet-webserver's deploy.yml, which hit the same
# constraint ("GitHub runners can't reach the instances … deploy locally").
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "wasm/**"
      - "core/**"
      - "Cargo.lock"
      - "scripts/deploy-eth.sh"
      - "scripts/copy-frontend-data.sh"
      - ".github/workflows/deploy-eth.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target ETH instance"
        required: true
        type: choice
        options:
          - ent
          - tst
          - prd

permissions:
  contents: read

# Serialize per-instance deploys so a push and a dispatch can't race the same
# docroot.
concurrency:
  group: eth-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'ent' }}
  cancel-in-progress: false

jobs:
  deploy:
    # Off until the ETH secrets are in place; flip CI_DEPLOY_ENABLED=true to arm
    # main→ent auto-deploy via the heimdall ProxyJump (see header).
    if: vars.CI_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    # push → ent; dispatch → chosen env. The GitHub Environment carries the
    # per-instance secrets/vars and (for prd) required-reviewer protection.
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'ent' }}
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'ent' }}
      # Non-interactive prd confirmation — the Environment's required reviewers
      # are the real gate in CI, not the script's terminal prompt.
      HYRR_ASSUME_YES: "1"
      # Per-environment docroot override (skips remote conf/servers detection
      # when set). Leave the variable unset to auto-detect.
      HYRR_ETH_DOCROOT: ${{ vars.ETH_DOCROOT }}
      # Route SSH through the ssh-config aliases (ethz-hyrr{ent,tst,prd}) that
      # ProxyJump the heimdall bastion — the instances aren't directly reachable
      # from the runner, but the bastion (pcposeth5.ethz.ch) is.
      HYRR_ETH_SSH_PREFIX: ethz-hyrr
      # The Shibboleth access whitelist (license gate) is delivered as a secret
      # and written to this path; deploy-eth.sh reads it from here.
      HYRR_ETH_WHITELIST: ${{ github.workspace }}/infra/eth-webhosting/whitelist.txt
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false

      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set data/meta data/stopping data/tendl-2023-iso/xs data/hi-xs-prod/xs data/endfb-8.1/xs

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Install sops + age
        run: nix profile install nixpkgs#sops nixpkgs#age

      - name: Decrypt ETH deploy secrets (sops/age) + configure SSH
        env:
          # The one bootstrap secret — the age private key that decrypts
          # secrets/eth-deploy.sops.env (bootstrap-eth-secrets.sh --set-age-secret).
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Decrypt the committed, age-encrypted secrets (base64 values).
          sops -d --output /tmp/eth.env secrets/eth-deploy.sops.env
          set -a; . /tmp/eth.env; set +a; rm -f /tmp/eth.env
          # Two keys: the bastion (heimdall) + the instance (hyrr) key. The
          # instances ProxyJump the (publicly reachable) bastion.
          printf '%s' "$HEIMDALL_KEY_B64" | base64 -d > ~/.ssh/id_ed25519_ethz
          printf '%s' "$HYRR_KEY_B64"     | base64 -d > ~/.ssh/id_ed25519_eth-hyrr
          printf '%s' "$KNOWN_HOSTS_B64"  | base64 -d > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519_ethz ~/.ssh/id_ed25519_eth-hyrr ~/.ssh/known_hosts
          # ssh-config aliases (leading spaces are fine — ssh_config ignores them).
          {
            echo "Host ethz-heimdall"
            echo "  HostName pcposeth5.ethz.ch"
            echo "  User larsgerchow"
            echo "  IdentityFile ~/.ssh/id_ed25519_ethz"
            echo "  IdentitiesOnly yes"
            for e in ent tst prd; do
              echo "Host ethz-hyrr$e"
              echo "  HostName hyrr$e.ethz.ch"
              echo "  User w3_hyrr$e"
              echo "  IdentityFile ~/.ssh/id_ed25519_eth-hyrr"
              echo "  IdentitiesOnly yes"
              echo "  ProxyJump ethz-heimdall"
            done
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          # License whitelist (Shibboleth gate) — the value keeps the deploy gated.
          mkdir -p infra/eth-webhosting
          printf '%s' "$WHITELIST_B64" | base64 -d > infra/eth-webhosting/whitelist.txt

      - name: Deploy ${{ env.TARGET_ENV }}
        run: scripts/deploy-eth.sh "$TARGET_ENV"

      - name: Smoke check
        run: |
          case "$TARGET_ENV" in
            prd) URL="https://hyrr.ethz.ch" ;;
            *)   URL="https://hyrr${TARGET_ENV}.ethz.ch" ;;
          esac
          code=$(curl -4 -sS -m 20 -o /dev/null -w '%{http_code}' "$URL")
          echo "$URL → HTTP $code"
          # Gated instances 302 → wayf.switch.ch (AAI); both 200 and 302 are healthy.
          case "$code" in
            200 | 302) : ;;
            *) echo "smoke failed"; exit 1 ;;
          esac
