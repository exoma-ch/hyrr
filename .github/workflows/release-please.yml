name: Release Please

# On every push to main, release-please scans conventional commits since the
# last release tag and either creates/updates a "Release vX.Y.Z" PR (with
# CHANGELOG + version bumps) or — if that PR was just merged — creates the
# tag + GitHub Release.
#
# Auth: a dedicated GitHub App (hyrr-release-bot) token, NOT GITHUB_TOKEN.
# GitHub deliberately suppresses workflow triggers for events made with the
# default GITHUB_TOKEN (anti-recursion). That used to mean (a) the release PR
# got no CI — a maintainer had to close→reopen it — and (b) the v* / hyrr-mcp-v*
# tags didn't fire the publish workflows, needing a manual dispatch. The App
# token is a non-default credential, so its commits and tags DO trigger
# workflows: the release PR gets CI automatically and the tags auto-publish.
# Secrets: RELEASE_PLEASE_APP_ID / RELEASE_PLEASE_APP_PRIVATE_KEY.
#
# The sync-release-lockfiles job (below) keeps uv.lock + wasm/Cargo.lock in sync
# with the versions release-please bumps (manifests bumped, lockfiles not —
# otherwise the required `lint` lockfile-sync gate fails). It checks out and
# pushes with the same App token so its lockfile commit also triggers the PR's
# CI (Refs: #445).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

      # When a release is created for the root package, also push a
      # hyrr-mcp-v* tag so release-hyrr-mcp.yml fires and publishes the
      # MCP wheel to PyPI. Both artifacts share the same version number.
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          fetch-depth: 0
          # App token so the hyrr-mcp-v* tag push triggers release-hyrr-mcp.yml.
          token: ${{ steps.app-token.outputs.token }}

      - name: Tag hyrr-mcp release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          git tag "hyrr-mcp-${TAG}"
          git push origin "hyrr-mcp-${TAG}"

  # When release-please opens/updates a release PR, it bumps the version in
  # pyproject.toml + wasm/Cargo.toml but leaves uv.lock and wasm/Cargo.lock
  # stale — which fails the required `lint` (lockfile-sync) gate. Regenerate
  # them on the release branch so the PR is mergeable once CI runs. Runs only
  # when a release PR exists (the `pr` output is empty on release-created /
  # no-op runs). See the CAVEAT in the header about triggering CI. (Refs: #445)
  sync-release-lockfiles:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          submodules: false
          # App token so the lockfile-sync commit triggers the release PR's CI.
          token: ${{ steps.app-token.outputs.token }}
      # cargo needs the nucl-parquet Rust client on disk to resolve the
      # wasm -> core -> nucl-parquet path-dep chain (sparse: client only).
      - name: Init nucl-parquet submodule (sparse — Rust client only)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set clients/rs/nucl-parquet
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate lockfiles to match bumped versions
        run: |
          # Minimal regen: uv lock only repins what changed; `cargo update -p`
          # touches the bumped local crate (and its path dependents) without
          # churning registry deps.
          uv lock
          cargo update --manifest-path wasm/Cargo.toml -p hyrr-core -p hyrr-wasm
      - name: Verify the gate now passes
        run: bash scripts/check-lockfiles.sh
      - name: Commit & push if changed
        run: |
          if git diff --quiet -- uv.lock wasm/Cargo.lock; then
            echo "Lockfiles already in sync — nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock wasm/Cargo.lock
          git commit -m "chore(release): sync uv.lock + wasm/Cargo.lock to bumped version"
          git push
