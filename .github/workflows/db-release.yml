name: Build Database

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Database version (e.g., 2024.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --dev

