name: E2E Tauri (WebDriver smoke)

# Tier 3 desktop-specific smoke tests (#188).
# Exercises IPC commands, window lifecycle, and desktop-only UI paths
# that the browser Playwright E2E (Tier 2) can't reach.
#
# Platform support: Linux + Windows only — tauri-driver has no macOS
# support (no WKWebView driver exists).

on:
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - "core/src/data_fetch.rs"
      - "frontend/src/lib/components/DataFetchSplash.svelte"
      - "frontend/src/lib/components/FetchErrorCard.svelte"
      - "frontend/src/lib/components/BugReportModal.svelte"
      - "frontend/src/lib/compute/backend.ts"
      - "frontend/src/lib/utils/platform.ts"
      - ".github/workflows/e2e-tauri.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-tauri:
    name: e2e-tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            binary: desktop/src-tauri/target/debug/hyrr-desktop
          - os: windows-latest
            binary: desktop/src-tauri/target/debug/hyrr-desktop.exe

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set \
            data/meta \
            data/stopping \
            data/tendl-2023-iso/xs

      - name: Copy parquet data to frontend public dir
        run: |
          mkdir -p frontend/public/data/parquet/{xs,meta,stopping}
          cp nucl-parquet/data/tendl-2023-iso/xs/*.parquet frontend/public/data/parquet/xs/
          cp nucl-parquet/data/meta/*.parquet frontend/public/data/parquet/meta/ 2>/dev/null || true
          cp nucl-parquet/data/stopping/*.parquet frontend/public/data/parquet/stopping/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          cache-on-failure: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - name: Install msedgedriver (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download the WebView2 WebDriver binary matching the system Edge version.
          # msedgedriver-tool downloads msedgedriver.exe to the CWD.
          # https://github.com/chippers/msedgedriver-tool (from Tauri docs)
          cargo install --git https://github.com/chippers/msedgedriver-tool --locked
          $driverDir = "$env:USERPROFILE\.webdriver"
          New-Item -ItemType Directory -Force -Path $driverDir | Out-Null
          Push-Location $driverDir
          & "$env:USERPROFILE\.cargo\bin\msedgedriver-tool.exe"
          Pop-Location
          echo "$driverDir" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies (root + frontend)
        run: |
          npm install
          cd frontend && npm install
          # Fix rollup native bindings on Linux
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save 2>/dev/null || true
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app (debug, no bundle)
        run: cargo build --manifest-path desktop/src-tauri/Cargo.toml

      - name: Verify binary exists
        run: ls -la "${{ matrix.binary }}"

      - name: Install WebdriverIO dependencies
        working-directory: desktop/tests
        run: npm install

      - name: Run WebDriver smoke tests (Linux)
        if: runner.os == 'Linux'
        working-directory: desktop/tests
        run: xvfb-run --auto-servernum npm test
        env:
          CI: "1"

      - name: Run WebDriver smoke tests (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop/tests
        run: npm test
        env:
          CI: "1"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-tauri-${{ matrix.os }}
          path: |
            desktop/tests/logs/
            desktop/tests/screenshots/
          retention-days: 7
          if-no-files-found: ignore
