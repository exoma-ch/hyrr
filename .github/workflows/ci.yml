name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Check lockfiles in sync
        run: bash scripts/check-lockfiles.sh

  # lint + test run inside the flake's lean `ci` devShell so the toolchain
  # (ruff, pyright, typos, typstyle, just, prek, uv, Python 3.12) is the exact
  # versions used by local dev (`nix develop`) — one pinned toolchain via
  # flake.lock, no drift.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      # Run the SAME gate local dev runs (.pre-commit-config.yaml via prek):
      # ruff, ruff-format, pyright, yamllint, shellcheck, pymarkdown, typos,
      # the pre-commit-hooks file checks, etc. One SSoT for "is this clean?".
      - name: Lint (prek run --all-files via flake)
        run: nix develop .#ci --command prek run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set data/meta data/stopping data/tendl-2023-iso/xs
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Test (uv + pytest via flake, Python 3.12)
        run: |
          nix develop .#ci --command bash -c '
            uv sync --dev
            uv run pytest tests/ --cov --benchmark-disable --ignore=tests/integration
          '

  rust-projectile-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set clients/rs/nucl-parquet data/meta data/stopping data/tendl-2023-iso/xs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Run projectile matrix (#148 Tier 1)
        working-directory: core
        env:
          HYRR_DATA: ${{ github.workspace }}/nucl-parquet/data
        run: cargo test --test projectile_matrix -- --include-ignored

  embedded-data-store:
    # #274 — verify the embedded data store initializes, queries work,
    # and a full simulation runs through the build-time tar.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set --no-cone \
            'clients/rs/nucl-parquet/' \
            'data/catalog.json' \
            'data/meta/' \
            'data/stopping/' \
            'data/tendl-2023-iso/xs/'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Run EmbeddedDataStore tests (including full simulation)
        working-directory: core
        run: cargo test --features embed-data --test embedded_data_store

  mcp-tools:
    # #427/#428 — exercise the MCP tool surface (layer selection, structured
    # export, emission curves). The `mcp` feature isn't in the default set, so
    # without this job the mcp:: tests are never compiled in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set clients/rs/nucl-parquet data/meta data/stopping data/tendl-2023-iso/xs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: MCP tool unit tests (layer selection, result cache, dataset round-trip)
        working-directory: core
        run: "cargo test --features mcp --lib mcp::"
      - name: MCP layer-selection integration test (real tendl-2023-iso data)
        working-directory: core
        env:
          HYRR_DATA: ${{ github.workspace }}/nucl-parquet/data
        run: cargo test --features mcp --test mcp_layer_selection
      - name: MCP structured-export integration test (inventory / dataset / emission curve)
        working-directory: core
        env:
          HYRR_DATA: ${{ github.workspace }}/nucl-parquet/data
        run: cargo test --features mcp --test mcp_structured_export

  hyrr-py-check:
    # Catches PyO3 binding type drift against hyrr-core (Refs: #181).
    # The py/ crate is excluded from the default workspace because the
    # pyo3 extension-module feature gate breaks linking under `cargo test`,
    # so signature changes in core (e.g. #150's Result-returning stopping
    # functions) can break the wheel silently. `cargo check` doesn't link
    # libpython, so it's safe to run here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse — Rust client only)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set clients/rs/nucl-parquet
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: py
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: cargo check py/ (PyO3 bindings)
        run: cargo check --manifest-path py/Cargo.toml

  data-fetch-integration:
    # #263 — exercises data_dir resolution, cache lifecycle, seed_from_dir,
    # and cold-start error paths without network access.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set --no-cone \
            'clients/rs/nucl-parquet/' \
            'data/catalog.json'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Run data_fetch unit tests (serial)
        working-directory: core
        run: cargo test --lib -- data_fetch --test-threads=1
      - name: Run MCP cold-start integration tests
        working-directory: core
        run: cargo test --test mcp_cold_start

  data-fetch-ssot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Assert docs do not pin a concrete data tarball version
        run: |
          # SSoT: tarball filename pattern lives in core/src/data_fetch.rs.
          # Concrete CalVer URLs in markdown drift silently when the
          # submodule version bumps. Use placeholder `<V>` instead.
          # Wire format (nucl-parquet#151 — Path A) is CalVer
          # YYYY.MM.MICRO, no `v` prefix; the 4-digit-year anchor
          # forces this regex to match the new shape, not loose
          # SemVer-shaped tokens like "data-1.2.3" that might appear
          # in unrelated prose.
          if grep -RnE 'nucl-parquet-data-[0-9]{4}\.[0-9]+\.[0-9]+\.tar\.zst' docs/; then
            echo "::error::docs hardcodes a concrete data-tarball version. Use <V> placeholder; SSoT is hyrr_core::data_fetch::release_url()."
            exit 1
          fi
          # Also catch the legacy `v`-prefixed shape — anything still
          # writing the pre-#151 format is a stale reference.
          if grep -RnE 'nucl-parquet-data-v[0-9]+\.[0-9]+\.[0-9]+\.tar\.zst' docs/; then
            echo "::error::docs uses the legacy v-prefixed tarball name (pre nucl-parquet#151). Update to data-<V> shape; SSoT is hyrr_core::data_fetch::release_url()."
            exit 1
          fi
      - name: Assert RELEASE_BASE host appears verbatim in data_fetch.rs
        run: |
          grep -q '"https://github.com/exoma-ch/nucl-parquet/releases/download"' core/src/data_fetch.rs || {
            echo "::error::RELEASE_BASE literal in core/src/data_fetch.rs has drifted; CI/docs assertions need updating in lockstep."
            exit 1
          }

  release-workflow-guards:
    # Catch release-workflow drift before it breaks a real release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # tauri.conf.json beforeBuildCommand runs from desktop/src-tauri/
      # (Tauri v2 CWD semantics). All --prefix paths must use ../../ to
      # reach the repo-root frontend/, matching frontendDist's depth.
      - name: Assert tauri.conf.json paths resolve from src-tauri/
        run: |
          CONF=desktop/src-tauri/tauri.conf.json
          if grep -qE '"before(Build|Dev)Command".*--prefix \.\./frontend"' "$CONF"; then
            echo "::error::beforeBuildCommand/beforeDevCommand uses --prefix ../frontend (1 level up) but Tauri v2 runs from src-tauri/ (needs ../../frontend, 2 levels up)."
            exit 1
          fi

      # All frontend-building workflows must use the SSoT copy script.
      - name: Assert workflows use copy-frontend-data.sh
        run: |
          for wf in tauri-build deploy-frontend promote-to-prod e2e e2e-tauri; do
            if ! grep -q 'copy-frontend-data.sh' ".github/workflows/${wf}.yml"; then
              echo "::error::${wf}.yml doesn't use scripts/copy-frontend-data.sh — data copy will drift."
              exit 1
            fi
          done

      # release-hyrr-mcp build/sdist jobs must init the nucl-parquet
      # submodule — core depends on it via path.
      - name: Assert release-hyrr-mcp.yml inits submodule in all build jobs
        run: |
          WF=.github/workflows/release-hyrr-mcp.yml
          COUNT=$(grep -c 'submodule update --init' "$WF")
          if [ "$COUNT" -lt 3 ]; then
            echo "::error::release-hyrr-mcp.yml has only $COUNT submodule-init steps — build, sdist, and parity-test all need one (core path-depends on nucl-parquet)."
            exit 1
          fi

  supplier-catalog-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Warn if supplier catalog is stale (>90 days)
        run: node frontend/scripts/check-suppliers-fresh.mjs
