name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/ data/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Pyright
        run: uv run pyright src/hyrr/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set meta stopping tendl-2024/xs
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest tests/ -v --benchmark-disable
      - name: Run tests with coverage
        run: uv run pytest tests/ --cov --benchmark-disable

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Run benchmarks
        run: uv run pytest tests/test_performance.py -v --benchmark-only --benchmark-json=benchmark.json || true
