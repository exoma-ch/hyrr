name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — a re-push (or a release-please
# rewrite) shouldn't leave the old run hogging a runner slot (#484).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── The merge gate: one hermetic `nix flake check` ─────────────────────
  # Replaces the old per-job cargo matrix (rust-projectile-matrix,
  # embedded-data-store, mcp-tools, hyrr-py-check, data-fetch-integration,
  # data-fetch-ssot, release-workflow-guards). Every one of those is now a
  # `checks.*` derivation in flake.nix — built identically here and on a
  # laptop (`nix flake check`), deps vendored from Cargo.lock, the
  # nucl-parquet data a pinned flake input (no submodule init needed), the
  # whole thing cached so unchanged inputs are hits (#484 Part A).
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: DeterminateSystems/nix-installer-action@v22
      # Cache the /nix/store (toolchain, vendored crates, the ~650 MB
      # nucl-parquet input, built check outputs) across runs via the GitHub
      # Actions cache — kills the "rebuild everything every run" tax. Keyed on
      # the lockfile + flake/Cargo inputs so it busts only on real changes.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', '**/Cargo.lock', 'core/Cargo.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Cap GC so the cache stays under the repo budget.
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: nix flake check (all hermetic gates)
        run: nix flake check -L

  # ── Lint: the prek SSoT (network — prek fetches/builds remote hook envs) ─
  # Can't be a hermetic check (prek downloads yamllint/shellcheck/pymarkdown
  # repos + builds their language envs), so it stays a thin cached job. Runs
  # the exact same `prek run --all-files` as local dev. (#159)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-lint-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-lint-${{ runner.os }}-
      - name: Lint (prek run --all-files via flake)
        run: nix develop .#ci --command prek run --all-files --show-diff-on-failure

  # ── Python tests (cached job) ──────────────────────────────────────────
  # Not hermetic: the suite leans on internal packages
  # (pycatima / py-materials / nucl-parquet) that have no public wheels, so a
  # uv2nix venv isn't worth the thrash — and the physics it exercises is
  # already hermetic-tested in Rust (`nix flake check`). Uses the flake-pinned
  # Python 3.12 + uv, so `nix develop .#ci -c pytest` reproduces it locally.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set data/meta data/stopping data/tendl-2023-iso/xs
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-test-${{ runner.os }}-${{ hashFiles('flake.lock', 'uv.lock') }}
          restore-prefixes-first-match: nix-test-${{ runner.os }}-
      - name: Test (uv + pytest via flake, Python 3.12)
        run: |
          nix develop .#ci --command bash -c '
            uv sync --dev
            uv run pytest tests/ --cov --benchmark-disable --ignore=tests/integration
          '

  # ── Lockfile sync (uv.lock / wasm Cargo.lock vs their manifests) ────────
  # Not a hermetic check: `uv lock --check` + `cargo check --locked` resolve /
  # compile against the network. Cheap, so it stays a standalone job.
  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Check lockfiles in sync
        run: bash scripts/check-lockfiles.sh

  # ── Supplier catalog freshness (warn-only, node) ───────────────────────
  supplier-catalog-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Warn if supplier catalog is stale (>90 days)
        run: node frontend/scripts/check-suppliers-fresh.mjs
