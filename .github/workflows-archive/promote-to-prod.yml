name: Promote to prod

# Manually-triggered promotion: rebuilds the given SHA with VITE_BASE_PATH=/hyrr/
# and deploys to the root of gh-pages. This is *not* a folder rename — the
# SW scope, manifest scope, and Vite-baked absolute paths all need to be the
# prod path, which only happens at build time. Rebuild is ~3 minutes and gives
# a clear audit trail (one commit per promotion).
#
# Default input is `main` HEAD; supply an explicit SHA to promote anything
# from history (e.g., to roll back after a bad promotion).
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to promote (default: latest main)"
        required: false
        default: ""

permissions:
  contents: write
  pages: read

concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target SHA
        id: target
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.sha }}
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Init nucl-parquet submodule (sparse)
        run: |
          git submodule update --init --depth 1 --filter=blob:none nucl-parquet
          cd nucl-parquet
          git sparse-checkout set data/meta data/stopping data/tendl-2023-iso/xs data/hi-xs-prod/xs data/endfb-8.1/xs

      - name: Copy nuclear data for frontend
        run: |
          scripts/copy-frontend-data.sh nucl-parquet/data frontend/public/data/parquet \
            tendl-2023-iso hi-xs-prod:hi-xs-prod endfb-8.1:neutron-xs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Build WASM compute engine
        run: wasm-pack build wasm/ --target web --no-opt --out-dir ../frontend/src/lib/compute/hyrr-wasm-pkg

      - name: Install dependencies
        run: npm install

      - name: Fix rollup native bindings
        working-directory: frontend
        run: npm install @rollup/rollup-linux-x64-gnu --no-save 2>/dev/null || true

      - name: Build frontend (base=/hyrr/)
        working-directory: frontend
        env:
          VITE_BASE_PATH: /hyrr/
        run: npm run build

      - name: Build docs into frontend/dist/docs/
        run: |
          pip install -e ".[docs]"
          mkdocs build -d frontend/dist/docs

      - name: Deploy to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/dist
          target-folder: .
          clean: true
          # Without this, deploying to root would nuke the /tst/ slot and any
          # /preview/* slots. The action's globs are evaluated *inside* the
          # target folder, so these patterns refer to top-level subdirs in
          # gh-pages, which is exactly what we want to preserve.
          clean-exclude: |
            tst/**
            preview/**
          commit-message: "deploy(prod): / from ${{ steps.target.outputs.sha }}"
