version: 2
updates:
  # Git submodules (nucl-parquet)
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # pip (Python)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
