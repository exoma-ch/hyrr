# sops config — how `sops` encrypts files under secrets/.
#
# All secrets/*.sops.* are age-encrypted to the HYRR deploy recipient below.
# The matching private key (SOPS_AGE_KEY in CI, ~/.config/sops/age/keys.txt
# locally) decrypts them. Rotate a secret by editing + re-encrypting:
#   sops secrets/eth-deploy.sops.env       # edit in place, re-encrypts on save
# or regenerate from source with scripts/bootstrap-eth-secrets.sh.
creation_rules:
  - path_regex: secrets/.*\.sops\.(env|ya?ml|json)$
    # hyrr-deploy — the age recipient authorised to hold ETH deploy secrets.
    age: age1cysh5nz5xpzlsjry7h6yuu0fv8gyyd6hj8ldsghhw4fqd9yqde2s5jgdj2
