<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="beamGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="triClip">
      <polygon points="185,130 185,382 330,256"/>
    </clipPath>
  </defs>

  <!-- Pure black background like the album -->
  <rect width="512" height="512" fill="#010409"/>

  <!-- The prism/target: triangle with horizontal layer bands -->
  <polygon points="185,130 185,382 330,256" fill="#0d1117" stroke="#c9d1d9" stroke-width="1.5"/>
  <g clip-path="url(#triClip)">
    <rect x="185" y="130" width="145" height="50" fill="#143040" opacity="0.6"/>
    <rect x="185" y="180" width="145" height="50" fill="#1a3a2a" opacity="0.6"/>
    <rect x="185" y="230" width="145" height="52" fill="#3d3018" opacity="0.6"/>
    <rect x="185" y="282" width="145" height="50" fill="#3b2818" opacity="0.6"/>
    <rect x="185" y="332" width="145" height="50" fill="#2a2030" opacity="0.6"/>
    <!-- Subtle layer separators -->
    <line x1="185" y1="180" x2="330" y2="180" stroke="#c9d1d9" stroke-width="0.3" opacity="0.4"/>
    <line x1="185" y1="230" x2="330" y2="230" stroke="#c9d1d9" stroke-width="0.3" opacity="0.4"/>
    <line x1="185" y1="282" x2="330" y2="282" stroke="#c9d1d9" stroke-width="0.3" opacity="0.4"/>
    <line x1="185" y1="332" x2="330" y2="332" stroke="#c9d1d9" stroke-width="0.3" opacity="0.4"/>
  </g>
  <!-- Redraw outline on top -->
  <polygon points="185,130 185,382 330,256" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>

  <!-- Incoming beam: single white line from lower-left to prism left face
       Matches the Dark Side angle — diagonal approach -->
  <line x1="40" y1="310" x2="185" y2="256" stroke="#e6edf3" stroke-width="2.5" filter="url(#beamGlow)"/>
  <line x1="40" y1="310" x2="185" y2="256" stroke="#e6edf3" stroke-width="12" opacity="0.04" filter="url(#beamGlow)"/>

  <!-- Emerging from the right vertex: cross-section excitation curves
       Fan out like the spectrum, but each line curves into a peak shape
       (excitation function: threshold rise → peak → tail) -->

  <!-- Channel 1 (top): violet — high threshold reaction like (p,3n) -->
  <path d="M330,256 C345,242 365,208 385,180
           C400,162 415,155 430,158
           C442,163 452,175 465,192"
        fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#glow)" opacity="0.85"/>

  <!-- Channel 2: teal — (p,2n) -->
  <path d="M330,256 C345,248 365,224 385,205
           C400,192 415,188 430,192
           C445,198 455,210 468,224"
        fill="none" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)" opacity="0.85"/>

  <!-- Channel 3: green — (p,n) dominant -->
  <path d="M330,256 C348,254 370,248 392,242
           C410,238 425,237 440,240
           C452,244 462,250 472,256"
        fill="none" stroke="#4ade80" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>

  <!-- Channel 4: yellow — (p,γ) -->
  <path d="M330,256 C345,262 365,280 385,300
           C400,314 415,320 430,318
           C445,314 458,304 470,292"
        fill="none" stroke="#fbbf24" stroke-width="2" filter="url(#glow)" opacity="0.85"/>

  <!-- Channel 5: orange — (p,α) -->
  <path d="M330,256 C345,268 365,302 385,335
           C398,354 413,362 428,360
           C443,355 456,342 468,328"
        fill="none" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" opacity="0.8"/>

  <!-- Channel 6 (bottom): red — (p,αn) -->
  <path d="M330,256 C342,275 360,330 380,370
           C395,394 412,402 428,398
           C444,390 458,374 470,356"
        fill="none" stroke="#ef4444" stroke-width="2" filter="url(#glow)" opacity="0.75"/>
</svg>