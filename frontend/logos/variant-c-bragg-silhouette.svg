<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="65%" stop-color="#d97706"/>
      <stop offset="85%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="65%" stop-color="#d97706" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="curveClip">
      <rect x="56" y="60" width="400" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117" rx="48"/>

  <!-- Bragg curve: the entire logo IS the curve
       Classic shape: slow rise, sharp peak near end, steep dropoff
       x: 56→456 (depth), y: 420 = baseline, peak at ~130 -->

  <!-- Filled area under curve -->
  <path d="M56,420
           C80,418 120,414 160,408
           C200,398 240,380 280,350
           C310,325 340,280 360,220
           C375,170 385,135 392,120
           C396,112 400,110 404,108
           C408,112 412,135 416,180
           C420,240 425,340 430,400
           C432,415 434,420 436,420
           Z"
        fill="url(#fillGrad)" clip-path="url(#curveClip)"/>

  <!-- Curve stroke -->
  <path d="M56,420
           C80,418 120,414 160,408
           C200,398 240,380 280,350
           C310,325 340,280 360,220
           C375,170 385,135 392,120
           C396,112 400,110 404,108
           C408,112 412,135 416,180
           C420,240 425,340 430,400
           C432,415 434,420 436,420"
        fill="none" stroke="url(#curveGrad)" stroke-width="3.5" filter="url(#glow)"
        clip-path="url(#curveClip)"/>

  <!-- Layer boundary lines (vertical dashes) -->
  <line x1="156" y1="100" x2="156" y2="420" stroke="#2d333b" stroke-width="1" stroke-dasharray="4,8"/>
  <line x1="256" y1="100" x2="256" y2="420" stroke="#2d333b" stroke-width="1" stroke-dasharray="4,8"/>
  <line x1="356" y1="100" x2="356" y2="420" stroke="#2d333b" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Peak dot -->
  <circle cx="404" cy="108" r="6" fill="#f0f6fc" opacity="0.9" filter="url(#glow)"/>

  <!-- Baseline -->
  <line x1="56" y1="420" x2="456" y2="420" stroke="#2d333b" stroke-width="1.5"/>
</svg>