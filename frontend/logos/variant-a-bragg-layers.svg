<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 512 512"
   width="512"
   height="512"
   version="1.1"
   id="svg255"
   sodipodi:docname="variant-a-bragg-layers.svg"
   inkscape:version="1.2.1 (9c6d41e4, 2022-07-14)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview257"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     showgrid="false"
     inkscape:zoom="0.79047772"
     inkscape:cx="253.64409"
     inkscape:cy="193.55384"
     inkscape:window-width="1630"
     inkscape:window-height="1106"
     inkscape:window-x="0"
     inkscape:window-y="25"
     inkscape:window-maximized="0"
     inkscape:current-layer="svg255" />
  <defs
     id="defs219">
    <!-- Beam glow -->
    <linearGradient
       id="beamGrad"
       x1="0"
       y1="0"
       x2="1"
       y2="0">
      <stop
         offset="0%"
         stop-color="#58a6ff"
         stop-opacity="1"
         id="stop182" />
      <stop
         offset="70%"
         stop-color="#58a6ff"
         stop-opacity="0.6"
         id="stop184" />
      <stop
         offset="100%"
         stop-color="#58a6ff"
         stop-opacity="0.05"
         id="stop186" />
    </linearGradient>
    <filter
       id="glow"
       x="-0.96"
       width="2.92"
       height="inf"
       y="-inf">
      <feGaussianBlur
         stdDeviation="4"
         result="blur"
         id="feGaussianBlur189" />
      <feMerge
         id="feMerge195">
        <feMergeNode
           in="blur"
           id="feMergeNode191" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode193" />
      </feMerge>
    </filter>
    <filter
       id="softGlow"
       x="-0.042666667"
       y="-inf"
       width="1.0853333"
       height="inf">
      <feGaussianBlur
         stdDeviation="8"
         result="blur"
         id="feGaussianBlur198" />
      <feMerge
         id="feMerge204">
        <feMergeNode
           in="blur"
           id="feMergeNode200" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode202" />
      </feMerge>
    </filter>
    <!-- Bragg curve clip per layer -->
    <clipPath
       id="layer0clip">
      <rect
         x="80"
         y="96"
         width="88"
         height="320"
         id="rect207" />
    </clipPath>
    <clipPath
       id="layer1clip">
      <rect
         x="168"
         y="96"
         width="88"
         height="320"
         id="rect210" />
    </clipPath>
    <clipPath
       id="layer2clip">
      <rect
         x="256"
         y="96"
         width="88"
         height="320"
         id="rect213" />
    </clipPath>
    <clipPath
       id="layer3clip">
      <rect
         x="344"
         y="96"
         width="88"
         height="320"
         id="rect216" />
    </clipPath>
  </defs>
  <!-- Background -->
  <rect
     width="512"
     height="512"
     fill="#0d1117"
     rx="48"
     id="rect221" />
  <!-- Layer slabs (vertical strips the beam passes through L→R) -->
  <rect
     x="80"
     y="96"
     width="88"
     height="320"
     rx="4"
     fill="#1b3a4b"
     opacity="0.7"
     id="rect223" />
  <rect
     x="168"
     y="96"
     width="88"
     height="320"
     rx="4"
     fill="#4a3728"
     opacity="0.7"
     id="rect225" />
  <rect
     x="256"
     y="96"
     width="88"
     height="320"
     rx="4"
     fill="#3b2d1a"
     opacity="0.7"
     id="rect227" />
  <rect
     x="344"
     y="96"
     width="88"
     height="320"
     rx="4"
     fill="#2d333b"
     opacity="0.7"
     id="rect229" />
  <!-- Beam line (horizontal, parallel, dims across) -->
  <line
     x1="30"
     y1="256"
     x2="480"
     y2="256"
     stroke="url(#beamGrad)"
     stroke-width="3"
     filter="url(#glow)"
     id="line231" />
  <line
     x1="30"
     y1="256"
     x2="480"
     y2="256"
     stroke="url(#beamGrad)"
     stroke-width="12"
     opacity="0.15"
     filter="url(#softGlow)"
     id="line233" />
  <!-- Bragg-like curve: gradual rise then sharp drop
       x = depth (80→432), y = energy deposition (256 center, curve goes UP)
       Asymmetric: slow rise over 300px, sharp peak at x≈390, drop to 0 by x≈420 -->
  <!-- Full curve path (energy deposition vs depth) -->
  <!-- Points: gentle rise from x=80, peaks around x=380, drops sharply by x=420 -->
  <!-- Layer 0 portion (teal) -->
  <path
     d="M80,256 C120,256 140,248 168,244 L168,256 Z"
     fill="#2dd4bf"
     opacity="0.5"
     clip-path="url(#layer0clip)"
     id="path235" />
  <path
     d="M80,256 C120,256 140,248 168,244"
     fill="none"
     stroke="#2dd4bf"
     stroke-width="2.5"
     clip-path="url(#layer0clip)"
     filter="url(#glow)"
     id="path237" />
  <!-- Layer 1 portion (amber) -->
  <path
     d="M168,244 C200,238 230,224 256,210 L256,256 L168,256 Z"
     fill="#f59e0b"
     opacity="0.4"
     clip-path="url(#layer1clip)"
     id="path239" />
  <path
     d="M168,244 C200,238 230,224 256,210"
     fill="none"
     stroke="#f59e0b"
     stroke-width="2.5"
     clip-path="url(#layer1clip)"
     filter="url(#glow)"
     id="path241" />
  <!-- Layer 2 portion (copper) — contains the peak -->
  <path
     d="M256,210 C290,185 320,150 350,130 C365,120 375,116 382,114 C390,116 395,130 400,170 L400,256 L256,256 Z"
     fill="#d97706"
     opacity="0.4"
     clip-path="url(#layer2clip)"
     id="path243" />
  <path
     d="M256,210 C290,185 320,150 350,130 C365,120 375,116 382,114"
     fill="none"
     stroke="#d97706"
     stroke-width="2.5"
     clip-path="url(#layer2clip)"
     filter="url(#glow)"
     id="path245" />
  <!-- Layer 3 portion (slate) — sharp dropoff -->
  <path
     d="m 344,136 c 5,-5 48.19506,-13.2461 56,34 10,50 15,75 20,83 5,2 10,3 12,3 v 0 h -88 z"
     fill="#8b949e"
     opacity="0.3"
     clip-path="url(#layer3clip)"
     id="path247"
     sodipodi:nodetypes="cccsccc" />
  <path
     d="M344,148 C355,125 365,118 382,114"
     fill="none"
     stroke="#8b949e"
     stroke-width="2.5"
     clip-path="url(#layer3clip)"
     filter="url(#glow)"
     opacity="0"
     id="path249" />
  <path
     d="m 344,134.19173 c 5.45548,-3.38439 47.02622,-11.90538 56,35.80827 10,50 15,75 20,83 5,2 10,3 12,3"
     fill="none"
     stroke="#8b949e"
     stroke-width="2.5"
     clip-path="url(#layer3clip)"
     filter="url(#glow)"
     id="path251"
     sodipodi:nodetypes="cccc" />
  <!-- Peak marker dot -->
  <circle
     fill="#f0f6fc"
     opacity="0.8"
     filter="url(#glow)"
     id="circle253"
     transform="translate(-38.000001,17.000001)"
     r="5"
     cy="115.61561"
     cx="399.88644" />
</svg>
