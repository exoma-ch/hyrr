<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="triClip">
      <polygon points="160,100 160,412 380,256"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117" rx="48"/>

  <!-- Triangle prism (pointing right, like Dark Side but with layers) -->
  <!-- Outer triangle -->
  <polygon points="160,100 160,412 380,256" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Horizontal layer bands inside the triangle -->
  <g clip-path="url(#triClip)">
    <rect x="160" y="100"  width="220" height="62" fill="#143040" opacity="0.9"/>
    <rect x="160" y="162"  width="220" height="62" fill="#1a3a2a" opacity="0.9"/>
    <rect x="160" y="224"  width="220" height="64" fill="#3d3018" opacity="0.9"/>
    <rect x="160" y="288"  width="220" height="62" fill="#3b2818" opacity="0.9"/>
    <rect x="160" y="350"  width="220" height="62" fill="#2a2030" opacity="0.9"/>
    <!-- Thin separator lines -->
    <line x1="160" y1="162" x2="380" y2="162" stroke="#0d1117" stroke-width="1.5"/>
    <line x1="160" y1="224" x2="380" y2="224" stroke="#0d1117" stroke-width="1.5"/>
    <line x1="160" y1="288" x2="380" y2="288" stroke="#0d1117" stroke-width="1.5"/>
    <line x1="160" y1="350" x2="380" y2="350" stroke="#0d1117" stroke-width="1.5"/>
  </g>

  <!-- Re-draw triangle outline on top -->
  <polygon points="160,100 160,412 380,256" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Incoming beam: single white line hitting left face -->
  <line x1="30" y1="256" x2="160" y2="256" stroke="#e6edf3" stroke-width="3" filter="url(#glow)"/>
  <line x1="30" y1="256" x2="160" y2="256" stroke="#e6edf3" stroke-width="14" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Dispersed beams from right vertex — the "isotope spectrum" -->
  <!-- 7 channels fanning out, each a different color -->
  <line x1="380" y1="256" x2="490" y2="126" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)" opacity="0.85"/>
  <line x1="380" y1="256" x2="490" y2="158" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)" opacity="0.85"/>
  <line x1="380" y1="256" x2="490" y2="194" stroke="#4ade80" stroke-width="2" filter="url(#glow)" opacity="0.85"/>
  <line x1="380" y1="256" x2="490" y2="236" stroke="#fbbf24" stroke-width="2" filter="url(#glow)" opacity="0.85"/>
  <line x1="380" y1="256" x2="490" y2="278" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" opacity="0.85"/>
  <line x1="380" y1="256" x2="490" y2="320" stroke="#ef4444" stroke-width="2" filter="url(#glow)" opacity="0.85"/>
  <line x1="380" y1="256" x2="490" y2="386" stroke="#f87171" stroke-width="2" filter="url(#glow)" opacity="0.7"/>

  <!-- Soft glow halos on dispersed beams -->
  <line x1="380" y1="256" x2="490" y2="126" stroke="#8b5cf6" stroke-width="10" opacity="0.04" filter="url(#softGlow)"/>
  <line x1="380" y1="256" x2="490" y2="158" stroke="#2dd4bf" stroke-width="10" opacity="0.04" filter="url(#softGlow)"/>
  <line x1="380" y1="256" x2="490" y2="194" stroke="#4ade80" stroke-width="10" opacity="0.04" filter="url(#softGlow)"/>
  <line x1="380" y1="256" x2="490" y2="236" stroke="#fbbf24" stroke-width="10" opacity="0.04" filter="url(#softGlow)"/>
  <line x1="380" y1="256" x2="490" y2="278" stroke="#f59e0b" stroke-width="10" opacity="0.04" filter="url(#softGlow)"/>
  <line x1="380" y1="256" x2="490" y2="320" stroke="#ef4444" stroke-width="10" opacity="0.04" filter="url(#softGlow)"/>
</svg>