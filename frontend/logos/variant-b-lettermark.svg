<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="beamIn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117" rx="48"/>

  <!-- "H" built from layer-colored bars -->
  <!-- Left vertical: 4 stacked bars -->
  <rect x="120" y="100" width="60" height="70" rx="3" fill="#2dd4bf" opacity="0.85"/>
  <rect x="120" y="178" width="60" height="70" rx="3" fill="#f59e0b" opacity="0.85"/>
  <rect x="120" y="256" width="60" height="70" rx="3" fill="#d97706" opacity="0.85"/>
  <rect x="120" y="334" width="60" height="70" rx="3" fill="#8b949e" opacity="0.75"/>

  <!-- Right vertical: 4 stacked bars -->
  <rect x="332" y="100" width="60" height="70" rx="3" fill="#2dd4bf" opacity="0.85"/>
  <rect x="332" y="178" width="60" height="70" rx="3" fill="#f59e0b" opacity="0.85"/>
  <rect x="332" y="256" width="60" height="70" rx="3" fill="#d97706" opacity="0.85"/>
  <rect x="332" y="334" width="60" height="70" rx="3" fill="#8b949e" opacity="0.75"/>

  <!-- Crossbar (the beam!) — glowing blue connecting line -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="#58a6ff" stroke-width="4" filter="url(#glow)"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#58a6ff" stroke-width="16" opacity="0.1" filter="url(#glow)"/>

  <!-- Small Bragg curve on the crossbar between the verticals -->
  <path d="M185,256 C210,254 240,250 270,242 C300,228 320,210 335,256"
        fill="#58a6ff" opacity="0.15"/>
  <path d="M185,256 C210,254 240,250 270,242 C300,228 320,210 335,256"
        fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.6" filter="url(#glow)"/>

  <!-- Entry arrow hint -->
  <polygon points="50,256 68,248 68,264" fill="#58a6ff" opacity="0.6"/>
</svg>