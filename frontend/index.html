    <script>
      // Apply saved theme before first paint to prevent flash
      (function(){var t=localStorage.getItem('hyrr-theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);else{var m=window.matchMedia('(prefers-color-scheme: light)').matches;document.documentElement.setAttribute('data-theme',m?'light':'dark')}})();
    </script>
    <div id="app"></div>
    <noscript>
      <h1>HYRR — Radioisotope Production Calculator</h1>
      <p>Free online tool for calculating radioisotope production yields in stacked target assemblies.
        Simulate proton, deuteron, alpha, and helion irradiations using evaluated nuclear data
        (TENDL-2024, ENDF/B-VIII.1, JENDL-5, JEFF-4.0). Compute activation yields, saturation
        activities, depth profiles, and cooling curves with Bateman decay chain resolution.</p>
      <p>Features: cross-section lookup, PSTAR/ASTAR tabulated stopping powers (more accurate
        than Bethe-Bloch), isotopic enrichment, multi-layer stacks, monitor foils, and exportable
        results. All computation runs locally in your browser — no server, no data upload.</p>
      <p>JavaScript is required to use this application.</p>
    </noscript>
