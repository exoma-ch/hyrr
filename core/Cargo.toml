[package]
name = "hyrr-core"
version = "0.1.0"
edition = "2021"
description = "Rust physics core for HYRR — Hierarchical Yield and Radionuclide Rates"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
parquet = { version = "54", default-features = false, features = ["arrow", "snap"] }
arrow = { version = "54", default-features = false, features = ["csv", "json"] }
regex = "1"

[dev-dependencies]
approx = "0.5"
