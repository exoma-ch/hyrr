[package]
name = "hyrr-core"
version = "0.1.0"
edition = "2021"
description = "Rust physics core for HYRR — Hierarchical Yield and Radionuclide Rates"
license = "MIT"
# Keep nix-libiconv dev workaround out of sdists that bundle this crate as a
# path-dep (notably the py-mcp maturin wheel).
exclude = [".cargo/**"]

[features]
default = ["parquet-store"]
parquet-store = ["dep:parquet", "dep:arrow"]
mcp = ["parquet-store"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
parquet = { version = "54", default-features = false, features = ["arrow", "snap", "zstd"], optional = true }
arrow = { version = "54", default-features = false, features = ["csv", "json"], optional = true }
regex = "1"

# Native-only deps for the lazy data-fetch path (#52). Gated so wasm32
# consumers don't pull reqwest/tar/zstd into their dependency graph.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
tar = "0.4"
zstd = "0.13"
fs2 = "0.4"

[dev-dependencies]
approx = "0.5"
tempfile = "3"
