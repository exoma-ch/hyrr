---
# .pre-commit-config.yaml — run by `prek` (not pre-commit). See flake.nix.

# Skip generated / vendored / upstream-data / scratch files for ALL hooks.
# These are not hand-maintained source: physics data tables (must not be
# reformatted), generated Tauri schemas, logo SVG assets, jupytext notebook
# pairs, the release-please CHANGELOG, and working/scratch docs.
exclude: |
  (?x)^(
    data/stopping/.*
    | .*\.dat
    | desktop/src-tauri/gen/.*
    | notebooks/.*
    | .*\.svg
    | CHANGELOG\.md
    | development-plan\.md
    | HANDOFF\.md
  )$

repos:
  # General Pre-commit Hooks (Fixes formatting issues)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
        # worker/src/index.ts strips PEM armor markers from a key blob; the
        # BEGIN/END marker literals there are pattern strings, not a real key.
        exclude: ^worker/src/index\.ts$
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # Python Linting and Formatting (Ruff) — use the flake's ruff (on PATH via
  # direnv `use flake`) so there's ONE pinned ruff version across pre-commit,
  # local dev, and CI. Avoids the pre-commit/uv/CI version drift.
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, --fix)
        entry: ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      # Pyright — flake's pinned pyright, same invocation as CI's lint job.
      # pass_filenames:false so it type-checks the whole package (src/hyrr/),
      # not just the changed files; only triggers when some Python file is staged.
      - id: pyright
        name: pyright (type check)
        entry: pyright src/hyrr/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  # YAML Linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["--format", "parsable", "--strict"]

  # Shellcheck (.envrc is a direnv file, not a shell script — skip SC2148)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        exclude: ^\.envrc$

  # Markdown Linting — keep structural rules, drop purely-stylistic ones the
  # repo doesn't follow (line-length, list-marker style, duplicate headings,
  # consecutive blanks, mandatory top-level H1, ordered-list numbering).
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.23
    hooks:
      - id: pymarkdown
        name: pymarkdown
        args:
          - "-d"
          - "MD013,MD024,MD004,MD012,MD041,MD029"
          - "scan"

  # Justfile formatting
  - repo: local
    hooks:
      - id: just-fmt
        name: just (format justfiles)
        entry: just --fmt --unstable
        language: system
        files: ^justfile(\..*)?$
        pass_filenames: false

  # Lockfile staleness check
  - repo: local
    hooks:
      - id: check-lockfiles
        name: check lockfiles in sync
        entry: scripts/check-lockfiles.sh
        language: system
        files: (pyproject\.toml|uv\.lock|wasm/Cargo\.(toml|lock))$
        pass_filenames: false

  # Typo Linting — flake's typos (downloaded binary doesn't run on NixOS)
  - repo: local
    hooks:
      - id: typos
        name: typos
        entry: typos --force-exclude
        language: system
        pass_filenames: true
        require_serial: true

  # Typstyle Linting
  - repo: local
    hooks:
      - id: typstyle
        name: typstyle
        entry: typstyle
        language: system
        files: ^.*\.typ$
        pass_filenames: true
        args: [--inplace]

  # ── guardrails deterministic gates (#159) ───────────────────────────────────
  # Binaries on PATH via the flake's `gates` package (both `.#ci` and default
  # shells). CI runs the same set through `nix develop .#ci -c prek run --all-files`.
  - repo: local
    hooks:
      - id: no-fake-impl
        name: guardrails — no fake/placeholder implementations
        entry: guardrails-no-fake-impl
        language: system
        pass_filenames: true
      - id: no-conflict-markers
        name: guardrails — no committed merge-conflict markers
        entry: guardrails-no-conflict-markers
        language: system
        pass_filenames: true
      # no-commented-code is intentionally NOT enabled: on this repo it is
      # 13-false-positive / 0-true-positive (it mis-fires on prose comments
      # ending in ';' and ones describing data shapes like `{ Z, A, ... }`).
      # Per guardrails' own philosophy a gate must have a low enough FP rate that
      # nobody reflexively bypasses it; revisit if the heuristic tightens
      # upstream (gerchowl/guardrails).
      - id: no-debug-leftovers
        name: guardrails — no debug-print leftovers (use the tracing facade)
        # CLI/server output surfaces + the SW-register lifecycle log are legit.
        entry: env GUARDRAILS_OUTPUT_GLOBS=src/hyrr/cli.py:*/mcp/transport.rs:py-mcp/src/lib.rs:py-mcp/python/hyrr_mcp/*:frontend/src/lib/sw-register.ts:frontend/scripts/*:frontend/e2e/* guardrails-no-debug-leftovers
        language: system
        pass_filenames: true
      - id: no-raw-trace-fields
        name: guardrails — no raw ?/% field formatters in tracing macros (privacy)
        # core/src/trace_schema.rs is the single audit surface where shaped fields live.
        entry: env GUARDRAILS_TRACE_ALLOW_GLOBS=core/src/trace_schema.rs guardrails-no-raw-trace-fields
        language: system
        pass_filenames: true
