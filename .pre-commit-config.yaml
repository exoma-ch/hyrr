---
# .pre-commit-config.yaml

repos:
  # General Pre-commit Hooks (Fixes formatting issues)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # Python Linting and Formatting (Ruff) — use the flake's ruff (on PATH via
  # direnv `use flake`) so there's ONE pinned ruff version across pre-commit,
  # local dev, and CI. Avoids the pre-commit/uv/CI version drift.
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, --fix)
        entry: ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

  # YAML Linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["--format", "parsable", "--strict"]

  # Shellcheck
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck

  # Markdown Linting
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.23
    hooks:
      - id: pymarkdown
        name: pymarkdown
        args: ["scan"]

  # Justfile formatting
  - repo: local
    hooks:
      - id: just-fmt
        name: just (format justfiles)
        entry: just --fmt --unstable
        language: system
        files: ^justfile(\..*)?$
        pass_filenames: false

  # Lockfile staleness check
  - repo: local
    hooks:
      - id: check-lockfiles
        name: check lockfiles in sync
        entry: scripts/check-lockfiles.sh
        language: system
        files: (pyproject\.toml|uv\.lock|wasm/Cargo\.(toml|lock))$
        pass_filenames: false

  # Typo Linting
  - repo: https://github.com/crate-ci/typos
    rev: v1.39.0
    hooks:
      - id: typos

  # Typstyle Linting
  - repo: local
    hooks:
      - id: typstyle
        name: typstyle
        entry: typstyle
        language: system
        files: ^.*\.typ$
        pass_filenames: true
        args: [--inplace]
